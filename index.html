<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEE NAHYUN — AI CREATOR</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--deep:#0c1628;--glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.12);--glass-hi:rgba(255,255,255,0.22);--text:#eef2ff;--text2:rgba(220,230,255,0.55);--accent:#8ba4f0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--deep);color:var(--text);font-family:'Space Grotesk',sans-serif}
.nebula-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 40%,#1e3a5a 0%,#132844 30%,#0c1628 70%);overflow:hidden}
.nebula-blob{position:absolute;border-radius:50%;filter:blur(80px);mix-blend-mode:screen;animation:nebF 20s ease-in-out infinite alternate;will-change:transform,opacity}
.b1{width:50vw;height:50vw;top:-10%;left:10%;background:radial-gradient(circle,rgba(220,80,160,0.35),transparent 70%);animation-duration:22s}
.b2{width:40vw;height:40vw;bottom:5%;right:-5%;background:radial-gradient(circle,rgba(40,200,160,0.3),transparent 70%);animation-duration:26s;animation-delay:-5s}
.b3{width:35vw;height:35vw;top:30%;right:20%;background:radial-gradient(circle,rgba(100,140,240,0.2),transparent 70%);animation-duration:30s;animation-delay:-10s}
.b4{width:30vw;height:30vw;bottom:20%;left:5%;background:radial-gradient(circle,rgba(200,100,180,0.15),transparent 70%);animation-duration:24s;animation-delay:-3s}
.b5{width:25vw;height:25vw;top:60%;left:40%;background:radial-gradient(circle,rgba(60,220,170,0.18),transparent 70%);animation-duration:28s;animation-delay:-8s}
@keyframes nebF{0%{transform:translate(0,0) scale(1);opacity:.7}50%{transform:translate(30px,-20px) scale(1.1);opacity:.9}100%{transform:translate(-20px,15px) scale(.95);opacity:.6}}
canvas#stars{position:fixed;inset:0;z-index:1;pointer-events:none}
.grain{position:fixed;inset:0;z-index:2;opacity:.04;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
#topnav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:16px 32px;font-size:11px;letter-spacing:.1em;color:var(--text2);backdrop-filter:blur(16px);background:rgba(12,22,40,.55);border-bottom:1px solid rgba(255,255,255,.05)}
#topnav .logo{color:var(--text);font-weight:700;font-size:13px}
#topnav .status{color:#6ee0b0}
#scene-wrap{position:fixed;inset:0;z-index:10;perspective:1100px;perspective-origin:50% 50%}
#scene{width:100%;height:100%;transform-style:preserve-3d}
.orbit-card{position:absolute;transform-style:preserve-3d;cursor:pointer;transition:filter .5s,opacity .4s;pointer-events:auto}
.orbit-card .face{position:relative;width:100%;height:100%;background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;overflow:hidden;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.23,1,.32,1),background .3s,border-color .3s,box-shadow .3s}
.orbit-card .face::before{content:'';position:absolute;inset:0;border-radius:18px;background:linear-gradient(135deg,var(--glass-hi) 0%,transparent 35%,transparent 65%,rgba(255,255,255,.05) 100%);pointer-events:none;z-index:3}
.orbit-card .face::after{content:'';position:absolute;top:0;left:8px;right:8px;height:4px;background:linear-gradient(90deg,transparent,var(--glass-hi),transparent);border-radius:18px 18px 0 0;transform:rotateX(80deg);transform-origin:bottom;opacity:.5;z-index:4}
.edge-l{position:absolute;top:10px;bottom:10px;left:-3px;width:3px;background:linear-gradient(180deg,var(--glass-hi),transparent 50%,rgba(255,255,255,.06));border-radius:18px 0 0 18px;transform:rotateY(-85deg);transform-origin:right;opacity:.5}
.edge-b{position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);z-index:4}
.glow-inner{position:absolute;inset:0;border-radius:18px;box-shadow:inset 0 1px 1px rgba(255,255,255,.08),inset 0 -1px 2px rgba(0,0,0,.3);pointer-events:none;z-index:3}
.refract{position:absolute;top:20%;left:-15%;right:-15%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transform:rotate(-4deg);pointer-events:none;z-index:3}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:20px;z-index:5;background:linear-gradient(transparent,rgba(0,0,0,.5))}
.card-num{font-size:10px;letter-spacing:.15em;color:var(--text2);margin-bottom:4px}
.card-sym{font-size:22px;margin-bottom:6px;opacity:.85}
.card-title{font-size:16px;font-weight:600;letter-spacing:.04em}
.card-sub{font-size:10px;color:var(--text2);margin-top:3px}
.click-hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.12em;color:var(--accent);opacity:0;transition:opacity .4s;z-index:6;text-align:center;white-space:nowrap;pointer-events:none}
.orbit-card.focused .click-hint{opacity:1;animation:hintPulse 2s ease-in-out infinite}
@keyframes hintPulse{0%,100%{opacity:.4}50%{opacity:1}}
.orbit-card.focused .face{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.1);box-shadow:0 0 50px -10px rgba(139,164,240,.3),0 25px 70px -20px rgba(0,0,0,.5)}
.orbit-card.focused{filter:blur(0px)!important;z-index:50!important;pointer-events:auto!important;cursor:pointer}
.dof-sharp{filter:blur(0px)}.dof-soft{filter:blur(2px);pointer-events:auto}.dof-far{filter:blur(4.5px);pointer-events:auto}.dof-veryfar{filter:blur(7px);pointer-events:auto}
#center-title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;text-align:center;pointer-events:none;transition:opacity .4s}
#center-title h1{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,6vw,72px);font-weight:300;font-style:italic;line-height:1;color:var(--text)}
#center-title .accent{font-weight:600;font-style:normal;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#center-title .sub{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:.18em;color:var(--text2);margin-top:14px;text-transform:uppercase}
#indicators{position:fixed;right:28px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:14px}
.ind-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:transparent;cursor:pointer;transition:all .3s;position:relative}
.ind-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--accent)}
.ind-dot:hover{border-color:var(--accent)}
.ind-dot .ind-label{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:10px;letter-spacing:.08em;color:var(--text2);white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.ind-dot:hover .ind-label{opacity:1}
#detail{position:fixed;inset:0;z-index:300;background:rgba(12,22,40,.92);backdrop-filter:blur(24px);opacity:0;pointer-events:none;transition:opacity .45s;overflow-y:auto}
#detail.active{opacity:1;pointer-events:auto}
#detail .d-inner{max-width:800px;margin:0 auto;padding:80px 40px 60px}
.d-back{font-size:11px;letter-spacing:.1em;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-bottom:24px;transition:color .2s}
.d-back:hover{color:var(--text)}
.d-number{font-size:10px;letter-spacing:.2em;color:var(--accent);margin-bottom:8px}
.d-title{font-size:32px;font-weight:600;margin-bottom:16px;line-height:1.2}
.d-desc{font-size:14px;line-height:1.8;color:var(--text2);margin-bottom:24px}
.d-section{margin-top:28px}
.d-section h3{font-size:12px;letter-spacing:.12em;color:var(--accent);margin-bottom:12px;text-transform:uppercase}
.d-video{width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;margin-bottom:20px;background:#0a0f1a}
.d-video.vertical{max-width:360px;aspect-ratio:9/16;margin:0 auto 20px}
.d-video iframe{width:100%;height:100%;border:none}
.scene-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.scene-grid img{width:100%;border-radius:6px;border:1px solid rgba(255,255,255,.06)}
.process-step{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.process-step-title{font-size:13px;font-weight:600;margin-bottom:6px}
.process-step-desc{font-size:13px;color:var(--text2);line-height:1.6}
.process-step img{width:100%;border-radius:6px;margin-top:8px;border:1px solid rgba(255,255,255,.06)}
.tool-badges{display:flex;flex-wrap:wrap;gap:6px}
.tool-badge{font-size:11px;padding:4px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;color:var(--text2)}
.tag-badge{font-size:11px;padding:3px 10px;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--text)}
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.sub-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.06);transition:border-color .2s,transform .2s}
.sub-card:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px)}
.sub-card img{width:100%;display:block;aspect-ratio:4/3;object-fit:cover}
.sub-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.6))}
.sub-cat{font-size:9px;letter-spacing:.08em;color:var(--text2)}
.sub-title{font-size:12px;font-weight:500;margin-top:2px}
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.skill-group h4{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:6px}
.skill-tags{display:flex;flex-wrap:wrap;gap:4px}
.skill-tag{font-size:10px;padding:3px 8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:4px;color:var(--text2)}
.art-filters{display:flex;gap:8px;margin-top:16px;margin-bottom:16px;flex-wrap:wrap}
.art-filter{font-size:11px;padding:5px 14px;border:1px solid rgba(255,255,255,.1);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;transition:all .2s}
.art-filter.active,.art-filter:hover{background:rgba(255,255,255,.1);color:var(--text);border-color:rgba(255,255,255,.25)}
#big-hint {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  font-family: Pretendard, -apple-system, sans-serif;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0px;
  color: #ffffff;
  text-align: center;
  background: rgba(12, 22, 40, 0.85);
  padding: 18px 40px;
  border-radius: 40px;
  border: 1px solid rgba(138, 180, 248, 0.4);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(138,180,248,0.2);
  backdrop-filter: blur(12px);
  pointer-events: none;
  animation: pulseBigHint 2s ease-in-out infinite;
  white-space: nowrap;
  transition: opacity 0.5s;
}
@keyframes pulseBigHint {
  0%, 100% { opacity: 0.85; transform: translateX(-50%) translateY(0); }
  50% { opacity: 1; transform: translateX(-50%) translateY(-8px); box-shadow: 0 12px 40px rgba(0,0,0,0.8), 0 0 30px rgba(138,180,248,0.4); }
}
@media(max-width:768px){#indicators{display:none}.skills-grid{grid-template-columns:1fr}.sub-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
</style>
</head>

document.addEventListener('mousemove',e=>{mouseX=(e.clientX/innerWidth-.5)*2;mouseY=(e.clientY/innerHeight-.5)*2});
let wA=0;document.addEventListener('wheel',e=>{if(detailOpen)return;wA+=e.deltaY;if(Math.abs(wA)>60){focusedIdx=(focusedIdx+Math.sign(wA)+cats.length)%cats.length;wA=0}},{passive:true});

let curF=0;
function animate(){
  curF+=(focusedIdx-curF)*.07;
  const tRY=mouseX*2.5,tRX=-mouseY*1.5;sceneRX+=(tRX-sceneRX)*.05;sceneRY+=(tRY-sceneRY)*.05;
  scene.style.transform=`rotateX(${sceneRX}deg) rotateY(${sceneRY}deg)`;
  const fA=(curF/cats.length)*Math.PI*2;
  cardEls.forEach((el,i)=>{
    const a=(i/cats.length)*Math.PI*2+Math.PI/2-fA;
    const x=Math.cos(a)*RX,z=Math.sin(a)*RZ,y=Math.sin(a*.5)*25;
    const px=mouseX*el._px*80,py=mouseY*el._px*50;
    const nZ=(z+RZ)/(RZ*2),sc=.55+nZ*.55,op=.3+nZ*.7;
    el.style.transform=`translate3d(${x+px}px,${y+py}px,${z}px) scale(${sc})`;
    el.style.opacity=op;el.style.zIndex=Math.round(nZ*100);
    el.classList.remove('dof-sharp','dof-soft','dof-far','dof-veryfar');
    if(nZ>.85)el.classList.add('dof-sharp');else if(nZ>.6)el.classList.add('dof-soft');else if(nZ>.3)el.classList.add('dof-far');else el.classList.add('dof-veryfar');
    el.classList.toggle('focused',Math.round(curF)%cats.length===i&&nZ>.8);
    el.querySelector('.face').style.transform=`rotateY(${(x/RX)*8}deg) rotateX(${-(y/30)*4}deg)`;
  });
  indWrap.querySelectorAll('.ind-dot').forEach((d,i)=>d.classList.toggle('active',i===Math.round(focusedIdx)%cats.length));
  document.getElementById('center-title').style.opacity=cats[Math.round(focusedIdx)%cats.length]?.id==='overview'?'1':'0';
  requestAnimationFrame(animate);
}

    h+=`<div class="d-number">001</div><div class="d-title" style="font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;font-style:italic">LEE <span style="font-weight:600;font-style:normal">NAHYUN</span></div>
    <div class="d-desc">AI Creator & Visual Director<br><br>방송 현장 조연출과 인하우스 영상 PD 출신의 실전 경험을 바탕으로, AI 모델을 결합한 하이브리드 자동화 크리에이티브 워크플로를 설계합니다.<br><br>상업적 완성도를 최우선으로 하며, 생성형 AI 결과물의 고질적 문제를 기술적 아키텍처 및 프롬프트 제어를 통해 해결하는 시스템 기반 크리에이터입니다.</div>
    <div class="skills-grid"><div class="skill-group"><h4>🎬 AI Generation</h4><div class="skill-tags"><span class="skill-tag">ComfyUI</span><span class="skill-tag">Kling</span><span class="skill-tag">Veo</span><span class="skill-tag">Midjourney</span><span class="skill-tag">Nano Banana</span></div></div><div class="skill-group"><h4>🎨 Post Production</h4><div class="skill-tags"><span class="skill-tag">After Effects</span><span class="skill-tag">Premiere Pro</span><span class="skill-tag">Photoshop</span><span class="skill-tag">Lightroom</span></div></div><div class="skill-group"><h4>📷 Production Gear</h4><div class="skill-tags"><span class="skill-tag">Sony A7M4</span><span class="skill-tag">난라이트 FC 120B</span></div></div><div class="skill-group"><h4>🤖 AI & Productivity</h4><div class="skill-tags"><span class="skill-tag">안티그래비티</span><span class="skill-tag">클로드</span><span class="skill-tag">노트북 LM</span><span class="skill-tag">옵시디언</span></div></div></div>
    <div style="margin-top:24px;display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:#6ee0b0;display:inline-block"></span><span style="font-size:12px;letter-spacing:.1em;color:var(--text2)">AVAILABLE FOR WORK</span></div>`;
  }else if(cid==='artwork'){
    h+=`<div class="d-number">${c.n}</div><div class="d-title">${c.s} ${c.t}</div>`;
    h+=`<div class="art-filters"><button class="art-filter active" onclick="filterArt('all',this)">All</button><button class="art-filter" onclick="filterArt('character',this)">Character</button><button class="art-filter" onclick="filterArt('concept-art',this)">Concept</button><button class="art-filter" onclick="filterArt('portrait',this)">Portrait</button><button class="art-filter" onclick="filterArt('product-image',this)">Product</button></div><div class="sub-grid" id="artGrid"></div>`;
  }else if(cid==='photography'){
    h+=`<div class="d-number">${c.n}</div><div class="d-title">${c.s} ${c.t}</div><div class="sub-grid">`;
    photoFiles.forEach(f=>{h+=`<div class="sub-card" onclick="openImg('${B}images/AI Image/Photography/${f}')"><img src="${B}images/AI Image/Photography/${f}" loading="lazy"><div class="sub-overlay"><div class="sub-cat">📸 Photo</div><div class="sub-title">Photography</div></div></div>`});
    h+='</div>';
  }else{
    h+=`<div class="d-number">${c.n}</div><div class="d-title">${c.s} ${c.t}</div>`;
    const cp=P.filter(p=>p.cat===cid);
    if(cp.length){h+='<div class="sub-grid">';cp.forEach(p=>{h+=`<div class="sub-card" onclick="openProj(${p.id})"><img src="${B}${p.th}" loading="lazy"><div class="sub-overlay"><div class="sub-cat">${p.b}</div><div class="sub-title">${p.t}</div></div></div>`});h+='</div>'}
  }
  dI.innerHTML=h;detail.classList.add('active');detail.scrollTop=0;
  if(cid==='artwork')filterArt('all');
}
function filterArt(sub,btn){
  if(btn)document.querySelectorAll('.art-filter').forEach(b=>b.classList.remove('active')),btn.classList.add('active');
  const g=document.getElementById('artGrid');if(!g)return;let f=[];
  if(sub==='all')Object.entries(artSubs).forEach(([c,fs])=>{const fd=c==='concept-art'?'Concept Art':c==='product-image'?'Product Image':c.charAt(0).toUpperCase()+c.slice(1);fs.forEach(fi=>f.push({src:B+'images/AI Image/'+fd+'/'+fi,c}))});
  else{const fd=sub==='concept-art'?'Concept Art':sub==='product-image'?'Product Image':sub.charAt(0).toUpperCase()+sub.slice(1);(artSubs[sub]||[]).forEach(fi=>f.push({src:B+'images/AI Image/'+fd+'/'+fi,c:sub}))}
  g.innerHTML=f.map(x=>`<div class="sub-card" onclick="openImg('${x.src}')"><img src="${x.src}" loading="lazy"><div class="sub-overlay"><div class="sub-cat">✨ AI</div><div class="sub-title">${x.c}</div></div></div>`).join('');
}
function openProj(id){
  const p=P.find(x=>x.id===id);if(!p)return;const v=p.o==='vertical';
  let h=`<div class="d-back" onclick="openDetail('${p.cat}')">← BACK</div><div class="d-number">${p.b}</div><div class="d-title">${p.t}</div>`;
  if(p.tg?.length)h+=`<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">${p.tg.map(t=>`<span class="tag-badge">${t}</span>`).join('')}</div>`;
  h+=`<div class="d-desc">${p.d}</div>`;
  if(p.dr)h+=`<div class="d-video${v?' vertical':''}"><iframe src="https://drive.google.com/file/d/${p.dr}/preview" allow="autoplay" allowfullscreen></iframe></div>`;
  if(p.imgs?.length)h+=`<div class="scene-grid">${p.imgs.map(s=>`<img src="${B}${s}">`).join('')}</div>`;
  if(p.sc?.length)h+=`<div class="d-section"><h3>EXTRACT.SCENES</h3><div class="scene-grid${v?' vertical':''}">${p.sc.map(s=>`<img src="${B}${s}" loading="lazy">`).join('')}</div></div>`;
  if(p.br)h+=`<div class="d-section"><h3>PROJECT_BRIEF</h3><p style="font-size:13px;line-height:1.7;color:var(--text2)">${p.br}</p></div>`;
  if(p.pr?.length)h+=`<div class="d-section"><h3>WORKFLOW_ARCH</h3>${p.pr.map(s=>`<div class="process-step"><div class="process-step-title">${s.t}</div><div class="process-step-desc">${s.d}</div>${s.img?`<img src="${B}${s.img}">`:''}</div>`).join('')}</div>`;
  if(p.td?.length)h+=`<div class="d-section"><h3>SYSTEM_REQUIRED_TOOLS</h3><div class="tool-badges">${p.td.map(t=>`<span class="tool-badge">${t}</span>`).join('')}</div></div>`;
  dI.innerHTML=h;detail.scrollTop=0;
}
function openImg(src){dI.innerHTML=`<div class="d-back" onclick="openDetail('artwork')">← BACK</div><img src="${src}" style="width:100%;max-width:600px;border-radius:12px;display:block;margin:20px auto">`;detail.scrollTop=0}
function closeDetail(){detailOpen=false;detail.classList.remove('active')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});

document.getElementById('downloadPdfBtn').addEventListener('click', function() {
  const element = document.body;
  const originalWidth = element.style.width;
  const originalHeight = element.style.height;
  
  const btn = this;
  const hint = document.getElementById('big-hint');
  
  btn.style.display = 'none';
  if(hint) hint.style.visibility = 'hidden';

  // Fix dimensions to current screen to avoid layout shift
  element.style.width = window.innerWidth + 'px';
  element.style.height = window.innerHeight + 'px';

  const opt = {
    margin:       0,
    filename:     'LEENAHYUN_Portfolio_Screen.pdf',
    image:        { type: 'jpeg', quality: 1.0 },
    html2canvas:  { 
      scale: 2, 
      useCORS: true, 
      backgroundColor: '#0c1628', 
      windowWidth: window.innerWidth,
      windowHeight: window.innerHeight,
      ignoreElements: function(el) {
        if(el.id === 'downloadPdfBtn' || el.id === 'big-hint') return true;
        if(el.classList && el.classList.contains('grain')) return true;
        return false;
      }
    },
    jsPDF:        { 
      unit: 'px', 
      format: [window.innerWidth, window.innerHeight], 
      orientation: window.innerWidth > window.innerHeight ? 'landscape' : 'portrait',
      putOnlyUsedFonts:true
    }
  };

  html2pdf().set(opt).from(element).save().then(() => {
    btn.style.display = 'block';
    if(hint) hint.style.visibility = 'visible';
    element.style.width = originalWidth;
    element.style.height = originalHeight;
  }).catch(err => {
    console.error('PDF Error:', err);
    btn.style.display = 'block';
    if(hint) hint.style.visibility = 'visible';
    element.style.width = originalWidth;
    element.style.height = originalHeight;
  });
});
</script>
